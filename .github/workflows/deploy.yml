name: Deploy mu-plugin

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (leave blank to deploy all)
        required: false

jobs:
  deploy:
    name: Deploy to ${{ matrix.environment }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment:
          # Add one entry per site. Each must match a GitHub Environment name.
          - example-site-cloudways
          # - example-site-pressable
          # - example-site-wordify

    # Skip environments not selected when using workflow_dispatch with a specific target
    if: >
      github.event_name == 'push' ||
      github.event.inputs.environment == '' ||
      github.event.inputs.environment == matrix.environment

    environment: ${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          protocol: ftps        # Use 'sftp' for Cloudways/Wordify; 'ftps' for Pressable
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}        # Typically 22 (sftp) or 21 (ftps)
          server-dir: ${{ secrets.SFTP_TARGET_DIR }}   # e.g. /wp-content/mu-plugins/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
